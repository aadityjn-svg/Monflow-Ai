name: Portal Learning

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write
  actions: read

concurrency:
  group: portal-learning-${{ github.ref }}
  cancel-in-progress: true

jobs:
  crawl-and-learn:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: portal-agent

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: portal-agent/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install chromium

      - name: Restore previous crawl state
        continue-on-error: true
        uses: dawidd6/action-download-artifact@v11
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: portal-learning.yml
          name: portal-learning-state
          path: portal-agent/artifacts/state
          if_no_artifact_found: warn

      - name: Restore committed crawl state
        run: |
          if [ -d ../.crawl-state ]; then
            mkdir -p artifacts/state
            cp -R ../.crawl-state/. artifacts/state/
          fi

      - name: Create env file
        run: |
          cat > .env <<'EOF'
          PORTAL_BASE_URL=${{ secrets.PORTAL_BASE_URL }}
          PORTAL_API_BASE_URL=${{ secrets.PORTAL_API_BASE_URL }}
          PORTAL_LOGIN_URL=${{ secrets.PORTAL_LOGIN_URL }}
          PORTAL_USERNAME=${{ secrets.PORTAL_USERNAME }}
          PORTAL_PASSWORD=${{ secrets.PORTAL_PASSWORD }}
          PORTAL_ROLE=${{ secrets.PORTAL_ROLE }}
          PORTAL_WORKSPACE_OWNER=${{ secrets.PORTAL_WORKSPACE_OWNER }}
          AGENT_ENABLE_LLM=false
          AGENT_HEADLESS=true
          AGENT_MAX_PAGES=45
          AGENT_MAX_DEPTH=2
          AGENT_SAFE_MODE=true
          AGENT_ENABLE_SAFE_INTERACTIONS=true
          AGENT_ENABLE_FORM_FILL=false
          AGENT_USE_ROUTE_SEED=true
          AGENT_FOLLOW_DISCOVERED_LINKS=true
          AGENT_PUSH_TO_BACKEND=true
          AGENT_INGEST_ENDPOINT=${{ secrets.AGENT_INGEST_ENDPOINT }}
          AGENT_INGEST_TOKEN=${{ secrets.AGENT_INGEST_TOKEN }}
          LOG_LEVEL=info
          EOF

      - name: Run portal learning
        run: npm run dev:learn

      - name: Upload crawl artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: portal-learning-artifacts
          path: portal-agent/artifacts

      - name: Upload crawl state
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: portal-learning-state
          path: portal-agent/artifacts/state
          if-no-files-found: warn

      - name: Commit updated crawl state
        if: always()
        run: |
          if [ ! -d artifacts/state ]; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p ../.crawl-state
          cp -R artifacts/state/. ../.crawl-state/
          git add ../.crawl-state
          git diff --cached --quiet && exit 0
          git commit -m "chore: update crawl state [skip ci]"
          git push
